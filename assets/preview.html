<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>
  body { font-family: sans-serif; background: #f0f0f0; padding: 40px; }
  .card { background: white; border-radius: 16px; padding: 40px; margin: 20px 0; box-shadow: 0 2px 16px rgba(0,0,0,0.1); }
  .dark { background: #1C1C2E; }
  h3 { margin: 0 0 20px; color: #666; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
  .dark h3 { color: #888; }
  .icon-row { display: flex; gap: 20px; align-items: center; }
  img { display: block; }
</style></head>
<body>

<div class="card">
  <h3>Logo — light background</h3>
  <img src="logo.svg" width="380" height="90">
</div>

<div class="card dark">
  <h3>Logo — dark background</h3>
  <img src="logo-white.svg" width="380" height="90">
</div>

<div class="card">
  <h3>App icon</h3>
  <div class="icon-row">
    <img src="icon.svg" width="100" height="100">
    <img src="icon.svg" width="60" height="60">
    <img src="icon.svg" width="48" height="48">
    <img src="icon.svg" width="29" height="29">
  </div>
</div>

</body>
</html>
