name: Build Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version name (e.g. 1.0.0)"
        required: false
        default: "dev"

jobs:
  # ── Android ──────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK + AAB
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.0"
          channel: stable
          cache: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/endurunce-release.jks

      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=API_URL=https://api.endurunce.nl \
            --build-name=${{ github.event.inputs.version || github.ref_name }} \
            --build-number=${{ github.run_number }}
        env:
          ANDROID_KEYSTORE_PATH: endurunce-release.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build release AAB (Play Store)
        run: |
          flutter build appbundle --release \
            --dart-define=API_URL=https://api.endurunce.nl \
            --build-name=${{ github.event.inputs.version || github.ref_name }} \
            --build-number=${{ github.run_number }}
        env:
          ANDROID_KEYSTORE_PATH: endurunce-release.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: endurunce-${{ github.event.inputs.version || github.ref_name }}-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: endurunce-${{ github.event.inputs.version || github.ref_name }}-android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

  # ── iOS ──────────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS (unsigned)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.0"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=API_URL=https://api.endurunce.nl \
            --build-name=${{ github.event.inputs.version || github.ref_name }} \
            --build-number=${{ github.run_number }}

      - name: Package into IPA (unsigned)
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r ../endurunce-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: endurunce-${{ github.event.inputs.version || github.ref_name }}-ios-unsigned
          path: build/ios/endurunce-unsigned.ipa
          retention-days: 90
